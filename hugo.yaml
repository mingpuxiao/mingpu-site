# ============================================================
#  Site configuration. Most day-to-day edits happen here or in
#  the data/ files. See UPDATING.md for a plain-language guide.
# ============================================================

# Final site lives at the root of the custom domain (no subpath).
# `hugo server` overrides this to http://localhost:PORT/ for local preview.
baseURL: "https://mingpuxiao.com/"
title: "Mingpu Xiao"
enableEmoji: false

# Drop generated files Hugo can't clean on its own.
ignoreFiles:
  - "\\.DS_Store$"

params:
  # --- Identity (shown in the hero and meta tags) ---
  author: "Mingpu Xiao"
  role: "Ph.D. Candidate"
  department: "Department of Political Science"
  university: "University of California, San Diego"
  year_in_program: "Sixth-year Ph.D. candidate"
  email: "mixiao@ucsd.edu"
  photo: "images/photo.jpg"
  photo_alt: "Mingpu Xiao"

  # One-line description used for the meta tag / search engines / link previews.
  description: "Mingpu Xiao is a Ph.D. candidate in Political Science at UC San Diego studying comparative political economy and political behavior in authoritarian regimes, with a regional focus on China."

  # --- Advising (grad-student specific) ---
  advisors: "Margaret E. Roberts and Victor Shih"
  committee: "J. Lawrence Broz, Megumi Naoi, and Francisco Garfias"

  # --- Research interests (rendered as keyword tags) ---
  research_interests:
    - "Political Economy"
    - "Authoritarian Politics"
    - "State and Market"
    - "Public Opinion"
    - "Information Politics"
    - "Computational Social Science"

# Top navigation. The "CV" tab is a placeholder pointing at /files/cv.pdf —
# add that PDF to static/files/ to activate it, or change the url to an
# external link (e.g. a Google Drive / Dropbox share).
menu:
  main:
    - name: "Bio"
      url: "/#bio"
      weight: 5
    - name: "Research"
      url: "/#research"
      weight: 10
    - name: "Teaching"
      url: "/#teaching"
      weight: 20
    - name: "CV"
      url: "/files/cv.pdf"
      weight: 30
    - name: "Hiking"
      url: "/photos/"
      weight: 40

markup:
  goldmark:
    renderer:
      unsafe: true   # allow inline HTML inside Markdown
  highlight:
    noClasses: false

# Cleaner, simpler output: no taxonomies we don't use.
# Sitemap is enabled (at /sitemap.xml) for search engines. No robots.txt is
# generated, which leaves the whole site crawlable.
disableKinds:
  - taxonomy
  - term
  - RSS
